version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: rme_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - rme_network

  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: rme_app
    volumes:
      - .:/var/www/html
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/custom.ini
    environment:
      - APP_ENV=${APP_ENV:-local}
      - APP_KEY=${APP_KEY}
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-rme_db}
      - DB_USERNAME=${DB_USERNAME:-rme_user}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REVERB_HOST=reverb
      - REVERB_PORT=8080
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - rme_network

  queue_worker:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: rme_queue_worker
    command: php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600
    volumes:
      - .:/var/www/html
    environment:
      - APP_ENV=${APP_ENV:-local}
      - APP_KEY=${APP_KEY}
      - DB_HOST=mysql
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE:-rme_db}
      - DB_USERNAME=${DB_USERNAME:-rme_user}
      - DB_PASSWORD=${DB_PASSWORD:-secret}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - app
      - redis
      - mysql
    restart: unless-stopped
    networks:
      - rme_network

  reverb:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: rme_reverb
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    ports:
      - "8080:8080"
    volumes:
      - .:/var/www/html
    environment:
      - APP_ENV=${APP_ENV:-local}
      - APP_KEY=${APP_KEY}
      - DB_HOST=mysql
      - REDIS_HOST=redis
      - REVERB_HOST=0.0.0.0
      - REVERB_PORT=8080
    depends_on:
      - app
      - redis
    restart: unless-stopped
    networks:
      - rme_network

  mysql:
    image: mysql:8.0
    container_name: rme_mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
      MYSQL_DATABASE: ${DB_DATABASE:-rme_db}
      MYSQL_USER: ${DB_USERNAME:-rme_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - rme_mysql_data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/my.cnf
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_ROOT_PASSWORD:-rootsecret}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rme_network

  redis:
    image: redis:7-alpine
    container_name: rme_redis
    ports:
      - "6379:6379"
    volumes:
      - rme_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rme_network

networks:
  rme_network:
    driver: bridge

volumes:
  rme_mysql_data:
  rme_redis_data:
